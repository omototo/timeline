name: Claude Code Review

on:
  pull_request:
    types: [opened, synchronize, ready_for_review, reopened]

jobs:
  claude-review:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
      issues: write
      id-token: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5
        with:
          fetch-depth: 1

      - name: Run Claude Code Review
        uses: anthropics/claude-code-action@v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          # One aggregated comment per review: post a single gh pr comment, no inline
          # comments (issue #14). Sticky so re-reviews update the same comment.
          use_sticky_comment: true
          claude_args: |
            --model opus
            --allowedTools "Bash(gh pr comment:*),Bash(gh pr diff:*),Bash(gh pr view:*)"
          prompt: |
            REPO: ${{ github.repository }}
            PR NUMBER: ${{ github.event.pull_request.number }}

            Review this pull request for correctness and bugs, the engine-purity rule
            (no Office.js / DOM / React under `packages/engine`), and the base rules in
            `CONTRIBUTING.md`.

            Post your ENTIRE review as ONE single PR comment via
            `gh pr comment ${{ github.event.pull_request.number }} --body "..."`.
            Lead with a one-line verdict, then group findings (blocking / non-blocking)
            with `file:line` references written inline in that one comment. Do NOT create
            separate inline review comments — post exactly one comment.
