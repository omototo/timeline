name: Claude Code Review

on:
  pull_request:
    types: [opened, synchronize, ready_for_review, reopened]

jobs:
  claude-review:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
      issues: write
      id-token: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5
        with:
          fetch-depth: 1

      - name: Run Claude Code Review
        uses: anthropics/claude-code-action@v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          claude_args: '--model opus'
          # The action posts the review natively as a single sticky comment.
          # No /code-review plugin (errors on our tsc -b refs) and no tool allowlist
          # (an allowlist blocks the built-in commenting).
          use_sticky_comment: true
          prompt: |
            Review this pull request. Focus on correctness and bugs, the engine-purity
            rule (no Office.js / DOM / React under `packages/engine`), and the base rules
            in `CONTRIBUTING.md`. Lead with a one-line verdict, then bullet any issues
            (or confirm it looks good). Be concise.
