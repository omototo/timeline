name: Claude Code Review

on:
  pull_request:
    types: [opened, synchronize, ready_for_review, reopened]

jobs:
  claude-review:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
      issues: write
      id-token: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5
        with:
          fetch-depth: 1

      - name: Run Claude Code Review
        uses: anthropics/claude-code-action@v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          prompt: |
            REPO: ${{ github.repository }}
            PR NUMBER: ${{ github.event.pull_request.number }}

            Please review this pull request with a focus on:
            - Correctness and potential bugs
            - The engine-purity rule (no Office.js / DOM / React under `packages/engine`)
            - The base rules in `CONTRIBUTING.md`

            Note: The PR branch is already checked out in the current working directory.

            Use `gh pr comment` for top-level feedback (lead with a one-line verdict).
            Use `mcp__github_inline_comment__create_inline_comment` (with `confirmed: true`) to flag specific lines.
            Only post GitHub comments — don't submit review text as messages.
          claude_args: |
            --model opus
            --allowedTools "mcp__github_inline_comment__create_inline_comment,Bash(gh pr comment:*),Bash(gh pr diff:*),Bash(gh pr view:*)"
