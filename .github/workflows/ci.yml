name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      # Single canonical gate — identical to what contributors run locally, so
      # "green locally" can never mean "red in CI". Runs:
      # check:text -> typecheck -> lint -> format:check -> test:cov -> build.
      - name: Verify
        run: bun run verify
